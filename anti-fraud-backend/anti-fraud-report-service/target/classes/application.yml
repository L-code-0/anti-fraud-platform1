server:
  port: 8084

spring:
  application:
    name: anti-fraud-report-service
  datasource:
    url: jdbc:mysql://localhost:3306/anti_fraud?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    loadbalancer:
      ribbon:
        enabled: false

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.anti.fraud.report.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Eureka 注册中心配置
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.cloud.client.ip-address}:${server.port}

# 日志配置
logging:
  level:
    com.anti.fraud.report: debug
