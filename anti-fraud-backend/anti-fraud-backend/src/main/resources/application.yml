server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:anti_fraud}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:MyRedis123}
      database: ${REDIS_DATABASE:0}
      timeout: 10000ms
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.anti.fraud.modules.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置 - 必须通过环境变量设置
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  header: Authorization
  prefix: Bearer

# CORS 配置 - 生产环境必须显式配置允许的域名
cors:
  allowed-patterns: ${CORS_ALLOWED_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  max-age: 3600

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.anti.fraud: ${LOG_LEVEL:debug}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# 文件上传配置
file:
  upload:
    path: ${FILE_UPLOAD_PATH:./uploads}
    prefix: /api/files
    max-size: 104857600 # 100MB
    allowed-types: jpg,png,gif,jpeg,pdf,doc,docx,xls,xlsx,txt

# 短信服务配置
sms:
  code:
    expire-time: 5 # 验证码过期时间（分钟）
    prefix: sms:code: # Redis存储前缀

# 第三方登录配置
third-party:
  wechat:
    app-id: ${WECHAT_APP_ID}
    app-secret: ${WECHAT_APP_SECRET}
    redirect-uri: ${WECHAT_REDIRECT_URI:http://localhost:8080/api/auth/login/wechat/callback}
    scope: snsapi_login
  dingtalk:
    app-id: ${DINGTALK_APP_ID}
    app-secret: ${DINGTALK_APP_SECRET}
    redirect-uri: ${DINGTALK_REDIRECT_URI:http://localhost:8080/api/auth/login/dingtalk/callback}
    scope: snsapi_login

# AI服务配置
ai:
  default-provider: ${AI_DEFAULT_PROVIDER:wenxin}
  wenxin:
    api-key: ${WENXIN_API_KEY}
    model: ${WENXIN_MODEL:ERNIE-Bot-4}
    api-url: ${WENXIN_API_URL:https://ark.cn-beijing.volces.com/api/v3}
    temperature: ${WENXIN_TEMPERATURE:0.7}
    max-tokens: ${WENXIN_MAX_TOKENS:2048}
  chatglm:
    api-key: ${CHATGLM_API_KEY}
    model: ${CHATGLM_MODEL:chatglm3-6b}
    api-url: ${CHATGLM_API_URL:https://open.bigmodel.cn/api/m/v1}
    temperature: ${CHATGLM_TEMPERATURE:0.7}
    max-tokens: ${CHATGLM_MAX_TOKENS:2048}
