# 开发环境配置
# 此文件用于本地开发，不会被提交到版本库

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/anti_fraud?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      password: MyRedis123
      database: 0

# 开发环境 JWT 密钥
# 开发时可通过环境变量覆盖，生产部署时必须使用环境变量
jwt:
  secret: ${JWT_SECRET:dev-only-secret-key-2024-not-for-production-use-min-32-chars}
  expiration: ${JWT_EXPIRATION:86400000}

# 开发环境 CORS 配置（允许本地开发服务器）
cors:
  allowed-patterns: http://localhost:*,http://127.0.0.1:*

logging:
  level:
    com.anti.fraud: debug
