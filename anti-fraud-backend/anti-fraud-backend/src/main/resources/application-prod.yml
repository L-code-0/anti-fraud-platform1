# 生产环境配置
# 【重要】部署前必须配置以下环境变量：
# - JWT_SECRET: 至少32字符的安全随机密钥
# - CORS_ALLOWED_PATTERNS: 生产环境前端域名，如 https://your-domain.com
# - DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD: 数据库连接信息
# - REDIS_HOST, REDIS_PORT, REDIS_PASSWORD: Redis连接信息

spring:
  datasource:
    # 生产环境建议使用连接池和SSL
    # url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&serverTimezone=GMT%2B8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      password: ${REDIS_PASSWORD}

# 【安全警告】生产环境必须设置强密钥！
jwt:
  # 必须通过环境变量 JWT_SECRET 设置，值不能硬编码
  secret: ${JWT_SECRET}
  # 生产环境建议设置较短的过期时间，如 2 小时 = 7200000
  expiration: ${JWT_EXPIRATION:7200000}

# 【安全警告】生产环境必须显式配置允许的域名！
cors:
  # 必须通过环境变量 CORS_ALLOWED_PATTERNS 设置，如 https://your-frontend.com
  # 禁止使用通配符 *
  allowed-patterns: ${CORS_ALLOWED_PATTERNS}

logging:
  level:
    com.anti.fraud: info
    # 生产环境不建议打印 SQL
    # com.anti.fraud.mapper: debug
